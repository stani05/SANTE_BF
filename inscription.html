<!DOCTYPE html>
<html>
    <head>
        <title>inscription</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="inscription.css">
        <link rel="stylesheet" href="responsive.css">
    </head>
    <body class="inscription_hop">
        <header>
            <nav>
               <button class="hamburger" id="hamburger">
                        <span></span>
                        <span></span>
                        <span></span>
                    </button>
                <div class="bannière">
                    <div class="logo"> <img src="logo.png" alt="logo du site">
                    </div>
                    <div class="menu">
                        <ul class="Menu" id="Menu">
                            <li><a href="index.html">Accueil</a></li>
                           
                        </ul>

                    </div>
                </div>
            </nav>
        </header>
        <main>
            
            <form >
                <h2>Inscription patient </h2>
                <p>Veuillez remplir ce formulaire</p>
                <div class="formulaire">
                    <h3>Informations personnelles</h3>
                    <div class="input_section">
                        <div class="nom_input">
                            <label for="nom">Nom </label>
                            <input type="text" id="nom" placeholder="votre nom"required>
                        </div>
                        <div class="prenom_input">
                            <label for="prenom">Prénom </label>
                            <input type="text" id="prenom" placeholder="votre prénom"required>
                        </div>
                    </div>
                    <div class="input_section">
                        <label for="date_nais">Date de naissance</label>
                        <input type="date" id="date" required>
                    </div>
                    <h3>Coordonées</h3>
                    <div class="input_section">
                        <label for="adresse" >Adresse</label>
                        <input type="text" id="adresse" placeholder="localité de résidence"required>
                    </div>
                    <div class="input_section">
                        <label for="contact">Contact</label>
                        <input type="number" id="contact" placeholder="numéro de téléphone"required>
                    </div>
                    <div class="input_section">
                        <label for="email">Adresse email</label>
                        <input type="email" id="eamil" placeholder="votre adresse email" required>
                    </div>
                    <h3>Sécurité</h3>
                    <div class="input_section">
                        <input type="password" id="password1" placeholder="Mot de passe" required>
                        <input type="password" id="password2" placeholder="Confirmer mot de passe " required>
                    </div>
                    
                    
            </form>
            <div class="politique">
                            <input type="checkbox" id="confi_politique">
                            <p>J'accepte les conditions générales d'utilisation et la politique de confidentialité</p>
                        </div>
                        <div class="politique">
                            <input type="checkbox" id="confi_politique">
                            <p>Je souhaite recevoir des informations sur ma santé par email</p>
                        </div>
                      
                    
                    <button type="submit" id="send">Créer mon compte patient</button>
                </div>
        </main>
    </body>
    <script src="script.js"></script>
</html>
